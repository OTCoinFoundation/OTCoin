<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OTCoin Wallet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#03030A;color:#E8E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#0C0D17;border:1px solid rgba(244,167,23,0.2);border-radius:16px;padding:32px;width:90%;max-width:460px;}
h1{color:#FFD166;font-size:28px;margin-bottom:8px;}
p{color:#5A5C78;font-size:13px;margin-bottom:20px;}
input{width:100%;background:#07080F;border:1px solid rgba(244,167,23,0.2);border-radius:8px;padding:12px;color:#E8E8F0;font-family:monospace;font-size:12px;outline:none;margin-bottom:12px;}
.btn{width:100%;padding:13px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;margin-bottom:8px;}
.gold{background:linear-gradient(135deg,#F4A717,#C97B00);color:#000;}
.out{background:transparent;color:#F4A717;border:1px solid rgba(244,167,23,0.3);}
.bal{text-align:center;margin-bottom:20px;}
.num{font-size:60px;font-weight:700;color:#FFD166;line-height:1;}
.unit{color:#C97B00;font-size:14px;letter-spacing:3px;margin-top:4px;}
.addr{font-family:monospace;font-size:10px;color:#5A5C78;word-break:break-all;margin-top:12px;}
</style>
</head>
<body>
<div class="box">
<div id="A">
<h1>OTCoin Wallet</h1>
<p>Enter your private key to access your wallet. Your key never leaves your browser.</p>
<input type="password" id="pk" placeholder="Private key (64 hex characters)...">
<button class="btn gold" onclick="login()">Access Wallet</button>
</div>
<div id="B" style="display:none">
<div class="bal">
<div style="font-size:10px;color:#5A5C78;letter-spacing:3px;margin-bottom:8px;">BALANCE</div>
<div class="num" id="n">...</div>
<div class="unit">OTC</div>
<div class="addr" id="ad"></div>
</div>
<button class="btn gold" onclick="load()">Refresh Balance</button>
<button class="btn out" onclick="lock()">Lock Wallet</button>
</div>
</div>
<script>
var ec=new elliptic.ec("secp256k1"),addr="";
function h2b(h){var b=[];for(var i=0;i<h.length;i+=2)b.push(parseInt(h.substr(i,2),16));return b;}
function b2h(b){return b.map(function(x){return x.toString(16).padStart(2,"0");}).join("");}
function getAddr(pk){
  var kp=ec.keyFromPrivate(pk,"hex");
  var pub=kp.getPublic(false,"hex").slice(2);
  var h1=sha256.array(h2b(pub));
  var h2=sha256.array(h1);
  return "1"+b2h(h2.slice(0,20));
}
function login(){
  var pk=document.getElementById("pk").value.trim();
  if(!pk||pk.length<20){alert("Enter valid private key!");return;}
  try{
    addr=getAddr(pk);
    document.getElementById("A").style.display="none";
    document.getElementById("B").style.display="block";
    document.getElementById("ad").textContent=addr;
    load();
  }catch(e){alert("Invalid private key!");}
}
function load(){
  document.getElementById("n").textContent="...";
  fetch("https://api.otcoin.org/api/balance/"+addr)
    .then(function(r){return r.json();})
    .then(function(d){document.getElementById("n").textContent=(d.balance||0).toLocaleString();})
    .catch(function(e){document.getElementById("n").textContent="Error: "+e.message;});
}
function lock(){
  addr="";
  document.getElementById("A").style.display="block";
  document.getElementById("B").style.display="none";
  document.getElementById("pk").value="";
}
</script>
</body>
</html>
